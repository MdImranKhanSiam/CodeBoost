{% extends 'home/master.html' %}

{% block content %}

{% load socialaccount %}
{% load static %}

<link rel="stylesheet" href="{% static 'css/home/master.css' %}">

<div class="google-auth-wrapper">

    <div class="google-auth-card">

        <div class="google-auth-title">
            Continue with Google
        </div>

        <div class="google-auth-text">
            You'll be redirected to Google to sign in securely, then brought right back here.
        </div>

        <form method="post" id="google-auth-form">
            {% csrf_token %}

            <div class="auth-check">
                <label class="auth-check-card">
                    <input type="checkbox" id="terms-check" required>

                    <span class="auth-check-content">
                        <span class="auth-check-title">
                            Age & Policy Confirmation
                        </span>

                        <span class="auth-check-text">
                            I confirm that I am at least <b>13 years old</b> and I agree to the
                            <a href="{% url 'terms-of-service' %}">Terms</a> & <a href="{% url 'privacy-policy' %}">Privacy Policy</a>.
                        </span>
                    </span>
                </label>
            </div>

            <button class="google-auth-button" id="google-auth-btn" type="submit" disabled>

                <img class="google-auth-logo" src="{% static 'image/other/google-logo.png' %}">

                Continue with Google

            </button>

        </form>

    </div>
</div>

<script>
const googleBtn = document.getElementById("google-auth-btn");
const termsCheck = document.getElementById("terms-check");

function updateButtonState() {
    googleBtn.disabled = !termsCheck.checked;
}

termsCheck.addEventListener("change", updateButtonState);

const googleForm = document.getElementById("google-auth-form");

googleForm.addEventListener("submit", function () {
    googleBtn.classList.add("google-auth-loading");
    googleBtn.innerHTML = "Connecting to Google...";
});
</script>

{% endblock %}
