services:

  # ─────────────────────────────────────────────────────────
  # Django App (Daphne ASGI)
  # ─────────────────────────────────────────────────────────
  web:
    build: .
    container_name: codeboost_web
    volumes:
      - static_volume:/app/staticfiles
    expose:
      - 8000
    env_file:
      - .env
    depends_on:
      - db
      - redis_cache
    restart: always
    networks:
      - internal

  # ─────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: codeboost_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    restart: always
    networks:
      - internal

  # ─────────────────────────────────────────────────────────
  # Redis Broker (for Celery - runs on YOUR local PC)
  # Exposed to internet so your local PC can connect to it
  # Max RAM: 250MB | evicts old keys when full (allkeys-lru)
  # ─────────────────────────────────────────────────────────
  redis_broker:
    image: redis:7-alpine
    container_name: codeboost_redis_broker
    command: >
      redis-server
      --port 6379
      --requirepass ${REDIS_BROKER_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    restart: always
    networks:
      - internal

  # ─────────────────────────────────────────────────────────
  # Redis Cache (for Django cache)
  # Internal only - not exposed outside VPS
  # Max RAM: 500MB | evicts old cache when full (allkeys-lru)
  # ─────────────────────────────────────────────────────────
  redis_cache:
    image: redis:7-alpine
    container_name: codeboost_redis_cache
    command: >
      redis-server
      --port 6379
      --requirepass ${REDIS_CACHE_PASSWORD}
      --maxmemory 250mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6380:6379"
    restart: always
    networks:
      - internal

  # ─────────────────────────────────────────────────────────
  # Nginx (HTTPS only - port 443)
  # Also listens on port 80 to redirect to HTTPS
  # ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: codeboost_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web
    restart: always
    networks:
      - internal


# ─────────────────────────────────────────────────────────
  # PostgreSQL Backup Service
  # Runs a cron job every day at 4:00 AM
  # Keeps last 30 days of backups
  # Backups stored at: /var/www/codeboost/backups/ on VPS
  # ─────────────────────────────────────────────────────────

  db_backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: codeboost_backup
    env_file:
      - .env
    volumes:
      - ./backups:/backups    # Backups go directly to VPS filesystem
    depends_on:
      - db
    restart: always
    networks:
      - internal


networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  static_volume: