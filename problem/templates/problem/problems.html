{% extends 'home/master.html' %}
{% block content %}
{% load static %}

<link rel="stylesheet" href="{% static 'css/problem/problems.css' %}" />


<section class="problems-section">

<div class="problems-header">
  <h1>Problems</h1>

  {% if request.user.is_authenticated and perms.problem.add_problem %}
    <button class="create-problem-btn" onclick="window.location.href='{% url 'create-problem' %}'">
        <span class="icon">
          <i class="fa-solid fa-circle-plus"></i>
        </span>
        <span class="text">Create Problem</span>
    </button>
  {% endif %}



  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search problems..." />

    <select id="difficultyFilter">
      <option value="">All Difficulty</option>
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
      <option value="challenging">Challenging</option>
    </select>
  </div>
</div>

<div class="problems-wrapper" id="problemsContainer">

  <div class="problem-row header">
    <div>ID</div>
    <div>Title</div>
    <div>Difficulty</div>
    <div>Solved</div>
  </div>

</div>

</section>

<script>
const problems = [
  {% for problem in problems %}
  {
    id: {{ problem.id }},
    title: "{{ problem.title|escapejs }}",
    difficulty: "{{ problem.difficulty }}",
    solved: {{ problem.solved|yesno:"true,false" }}
  },
  {% endfor %}
];

const container = document.getElementById('problemsContainer');
const searchInput = document.getElementById('searchInput');
const difficultyFilter = document.getElementById('difficultyFilter');

function renderProblems(list){
  container.innerHTML = `
    <div class="problem-row header">
      <div>ID</div>
      <div>Title</div>
      <div>Difficulty</div>
      <div>Solved</div>
    </div>
  `;

  list.forEach(p => {
    const row = document.createElement('div');
    row.className = 'problem-row';
    row.onclick = () => {
      window.location.href = `/problems/problem_detail/${p.id}/`;
    };

    row.innerHTML = `
      <div>${p.id}</div>
      <div>${p.title}</div>
      <div class="difficulty ${p.difficulty}">${p.difficulty}</div>
      <div class="status ${p.solved ? 'solved' : ''}">
        ${p.solved ? '✔ Solved' : ''}
      </div>
    `;

    container.appendChild(row);
  });
}

function filterProblems(){
  const search = searchInput.value.toLowerCase();
  const difficulty = difficultyFilter.value;

  const filtered = problems.filter(p => {
    const matchSearch = p.title.toLowerCase().includes(search);
    const matchDifficulty = difficulty ? p.difficulty === difficulty : true;
    return matchSearch && matchDifficulty;
  });

  renderProblems(filtered);
}

searchInput.addEventListener('input', filterProblems);
difficultyFilter.addEventListener('change', filterProblems);

renderProblems(problems);

</script>

{% endblock %}
