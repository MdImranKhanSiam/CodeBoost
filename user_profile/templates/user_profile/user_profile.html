function ensureJanuaryAndDecember(dataByYear) {
    const result = {};

    Object.keys(dataByYear).forEach(year => {
        const entries = dataByYear[year].data;

        let hasJan1 = false;
        let hasDec20 = false;

        entries.forEach(item => {
            const [y, m, d] = item.date.split("-");

            if (m === "01" && d === "01") {
                hasJan1 = true;
            }

            if (m === "12" && d === "24") {
                hasDec20 = true;
            }
        });

        const newData = [...entries];

        if (!hasJan1) {
            newData.push({
                date: `${year}-01-01`,
                count: 0
            });
        }

        if (!hasDec20) {
            newData.push({
                date: `${year}-12-24`,
                count: 0
            });
        }

        result[year] = { data: newData };
    });

    return result;
}
